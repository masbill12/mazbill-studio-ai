<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZBILL AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .sparkle-btn {
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            transition: all 0.3s ease;
        }
        .sparkle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="p-4 glass sticky top-0 z-10 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/50">
                <i class="fas fa-robot text-white"></i>
            </div>
            <h1 class="font-bold text-xl tracking-tight uppercase">Mazbill <span class="text-blue-400">Studio</span></h1>
        </div>
        <div class="flex gap-3">
            <button onclick="summarizeChat()" title="Ringkas Percakapan" class="text-slate-400 hover:text-blue-400 transition-colors">
                <i class="fas fa-compress-alt"></i>
            </button>
            <button onclick="openSettings()" class="text-slate-400 hover:text-white transition-colors">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>

    <!-- Smart Tools Bar -->
    <div class="px-4 py-2 flex gap-2 overflow-x-auto no-scrollbar border-b border-white/5">
        <button onclick="magicFeature('brainstorm')" class="sparkle-btn shrink-0 px-3 py-1.5 rounded-full text-xs font-medium flex items-center gap-1">
            ✨ Brainstorm Ide
        </button>
        <button id="visionBtn" onclick="magicFeature('analyze')" class="hidden bg-slate-800 border border-white/10 shrink-0 px-3 py-1.5 rounded-full text-xs font-medium flex items-center gap-1 hover:bg-slate-700 transition-all">
            ✨ Analisis Desain
        </button>
        <button id="captionBtn" onclick="magicFeature('caption')" class="hidden bg-slate-800 border border-white/10 shrink-0 px-3 py-1.5 rounded-full text-xs font-medium flex items-center gap-1 hover:bg-slate-700 transition-all">
            ✨ Buat Caption
        </button>
    </div>

    <!-- Main Chat Area -->
    <main id="chatContainer" class="chat-container flex-1 overflow-y-auto p-4 space-y-4">
        <!-- Welcome Message -->
        <div class="flex justify-start">
            <div class="glass p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm leading-relaxed">
                Halo Mazbill! 👋 Saya asisten AI-mu. <br><br>
                Gunakan tombol ✨ di atas untuk fitur instan, atau unggah desain <strong>Ibis Paint</strong> kamu untuk mendapatkan masukan!
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="p-4 glass border-t border-white/5">
        <div class="flex flex-col gap-3">
            <!-- Preview Image -->
            <div id="imagePreviewContainer" class="hidden relative w-24 h-24">
                <img id="imagePreview" src="#" class="w-full h-full object-cover rounded-xl border-2 border-blue-500/50 shadow-lg">
                <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-500 rounded-full w-6 h-6 text-[12px] flex items-center justify-center shadow-lg">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="flex items-end gap-2">
                <label class="p-3 glass rounded-xl cursor-pointer hover:bg-slate-700 transition-all flex items-center justify-center">
                    <i class="fas fa-image text-blue-400"></i>
                    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImage(this)">
                </label>
                <div class="relative flex-1">
                    <textarea id="userInput" 
                        rows="1"
                        placeholder="Tanyakan sesuatu..." 
                        class="w-full glass rounded-xl p-3 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none max-h-32 text-sm"
                        oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                    <button id="sendBtn" onclick="sendMessage()" class="absolute right-2 bottom-2 p-2 text-blue-400 hover:text-blue-300 transition-all">
                        <i class="fas fa-paper-plane text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </footer>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/80 hidden z-50 items-center justify-center p-4">
        <div class="glass w-full max-w-md p-6 rounded-3xl space-y-4 shadow-2xl">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-key text-yellow-400"></i> Pengaturan AI
            </h2>
            <p class="text-xs text-slate-400 leading-relaxed">Gunakan API Key Gemini kamu. Data disimpan secara lokal di browser HP-mu.</p>
            <input type="password" id="apiKeyInput" placeholder="Masukkan Gemini API Key..." class="w-full glass p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <div class="flex gap-2">
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 hover:bg-blue-500 p-3 rounded-xl font-bold transition-all">Simpan</button>
                <button onclick="closeSettings()" class="flex-1 bg-slate-700 hover:bg-slate-600 p-3 rounded-xl font-bold transition-all">Tutup</button>
            </div>
        </div>
    </div>

   <script>
let base64Image = "";
let chatHistory = [];

function handleImage(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
        base64Image = e.target.result.split(',')[1];
        document.getElementById('imagePreview').src = e.target.result;
        document.getElementById('imagePreviewContainer').classList.remove('hidden');
        document.getElementById('visionBtn').classList.remove('hidden');
        document.getElementById('captionBtn').classList.remove('hidden');
    };
    reader.readAsDataURL(file);
}

function clearImage() {
    base64Image = "";
    document.getElementById('imageInput').value = "";
    document.getElementById('imagePreviewContainer').classList.add('hidden');
    document.getElementById('visionBtn').classList.add('hidden');
    document.getElementById('captionBtn').classList.add('hidden');
}

async function callGemini(text, imgData = null) {
    const res = await fetch("/.netlify/functions/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: text,
            image: imgData
        })
    });

    const data = await res.json();

    if (!res.ok) {
        throw new Error(data.error || "Server error");
    }

    return data.reply;
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message && !base64Image) return;

    const currentImg = base64Image;

    addMessage("Anda", message, true, currentImg);

    input.value = "";
    input.style.height = 'auto';
    clearImage();

    const loadingId = addMessage("AI", "Sedang mikir...", false);

    try {
        const result = await callGemini(message, currentImg);
        updateMessage(loadingId, result);

        chatHistory.push({ role: "User", text: message });
        chatHistory.push({ role: "AI", text: result });

    } catch (error) {
        updateMessage(loadingId, "❌ Backend error / belum deploy.");
    }
}

function addMessage(sender, text, isUser, imgData = null) {
    const container = document.getElementById('chatContainer');
    const id = "msg-" + Date.now();

    const div = document.createElement('div');
    div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;

    let content = `<div id="${id}" class="glass p-3 rounded-2xl max-w-[85%] text-sm whitespace-pre-wrap">`;

    if (imgData) {
        content += `<img src="data:image/png;base64,${imgData}" class="w-full rounded-lg mb-2">`;
    }

    content += text + `</div>`;
    div.innerHTML = content;

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;

    return id;
}

function updateMessage(id, text) {
    const el = document.getElementById(id);
    if (el) el.innerText = text;
}
</script>
</body>
</html>
